name: researchrabbit-backend
services:
  - name: api
    github:
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080
    environment_slug: python
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 8080
    envs:
      - key: DO_INFERENCE_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: EMBEDDING_MODEL
        scope: RUN_TIME
        value: qwen3-embedding-0.6b
      - key: CHAT_MODEL
        scope: RUN_TIME
        value: anthropic-claude-haiku-4.5
      - key: DO_CHAT_URL
        scope: RUN_TIME
        value: https://inference.do-ai.run/v1/chat/completions
      - key: QA_MAX_TOKENS
        scope: RUN_TIME
        value: "320"
      - key: QA_TEMPERATURE
        scope: RUN_TIME
        value: "0.2"
      - key: QA_MAX_PAGE_CHARS
        scope: RUN_TIME
        value: "60000"
      - key: QA_MAX_HISTORY_MESSAGES
        scope: RUN_TIME
        value: "12"
      - key: QA_PAGE_CACHE_SIZE
        scope: RUN_TIME
        value: "128"
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: "chrome-extension://*"
